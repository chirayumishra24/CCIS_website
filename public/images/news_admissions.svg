<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2E40"/>
      <stop offset="50%" stop-color="#0F1B29"/>
      <stop offset="100%" stop-color="#050A10"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5A3"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#aa8619"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#E8D4A0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad2)"/>

  <!-- Academic Crest Backdrop -->
  <g opacity="0.12" fill="none" stroke="#FFFFFF" stroke-width="2" transform="translate(400, 180)">
    <circle r="160" />
    <circle r="140" stroke-dasharray="10 10"/>
    <polygon points="0,-120 100,-40 60,80 -60,80 -100,-40" />
  </g>

  <!-- Graduation Cap & Book Illustration -->
  <g transform="translate(250, 90)">
    <!-- Open Book -->
    <path d="M 50 160 Q 150 120 250 160 Q 350 120 450 160 L 450 240 Q 350 200 250 240 Q 150 200 50 240 Z" fill="url(#goldGrad2)" opacity="0.25"/>
    <path d="M 250 160 L 250 240" stroke="#D4AF37" stroke-width="4"/>
    <path d="M 70 170 Q 150 135 240 170 M 70 190 Q 150 155 240 190 M 70 210 Q 150 175 240 210" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    <path d="M 260 170 Q 350 135 430 170 M 260 190 Q 350 155 430 190 M 260 210 Q 350 175 430 210" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>

    <!-- Mortarboard Cap -->
    <polygon points="250,40 400,100 250,160 100,100" fill="url(#goldGrad2)"/>
    <polygon points="250,55 370,103 250,150 130,103" fill="#1A2E40"/>
    <!-- Skullcap Base -->
    <path d="M 160 125 L 160 165 C 160 190 340 190 340 165 L 340 125 Z" fill="url(#goldGrad2)" opacity="0.8"/>
    <!-- Tassel -->
    <circle cx="250" cy="100" r="8" fill="#FFFFFF"/>
    <path d="M 250 100 Q 340 120 350 170" fill="none" stroke="#FFE5A3" stroke-width="4" stroke-linecap="round"/>
    <polygon points="345,170 355,170 358,200 342,200" fill="#FFE5A3"/>
  </g>

  <!-- CBSE & IB Seals -->
  <g transform="translate(100, 240)">
    <rect width="110" height="36" rx="6" fill="rgba(255,255,255,0.1)" stroke="url(#goldGrad2)" stroke-width="1.5"/>
    <text x="55" y="23" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">CBSE</text>
  </g>
  <g transform="translate(230, 240)">
    <rect width="110" height="36" rx="6" fill="rgba(255,255,255,0.1)" stroke="url(#goldGrad2)" stroke-width="1.5"/>
    <text x="55" y="23" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D4AF37" text-anchor="middle">IB PYP</text>
  </g>

  <!-- Ribbon Badge -->
  <g transform="translate(560, 60)">
    <circle cx="60" cy="60" r="50" fill="url(#goldGrad2)"/>
    <circle cx="60" cy="60" r="42" fill="#0F1B29"/>
    <text x="60" y="54" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFE5A3" text-anchor="middle">SESSION</text>
    <text x="60" y="74" font-family="sans-serif" font-size="15" font-weight="extrabold" fill="#FFFFFF" text-anchor="middle">2026-27</text>
  </g>

  <!-- Text Overlay -->
  <rect x="0" y="320" width="800" height="130" fill="linear-gradient(to top, rgba(5,10,16,0.95), transparent)"/>
  
  <rect x="40" y="340" width="160" height="28" rx="14" fill="url(#badgeGrad)"/>
  <text x="120" y="358" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0A1128" text-anchor="middle" letter-spacing="1">ADMISSIONS OPEN</text>

  <text x="40" y="395" font-family="'Times New Roman', serif" font-size="24" font-weight="bold" fill="#FFFFFF">CBSE &amp; IB World School Pathways</text>
  <text x="40" y="420" font-family="sans-serif" font-size="14" fill="#D4AF37">Nursery to XII • Cambridge Court International School</text>
</svg>
