<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1128"/>
      <stop offset="50%" stop-color="#1C2D5A"/>
      <stop offset="100%" stop-color="#001F3F"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB"/>
      <stop offset="50%" stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#99731C"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0077FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Tech Grid Pattern -->
  <g opacity="0.15" stroke="#FFFFFF" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="800" height="450" fill="url(#grid)"/>
  </g>

  <!-- Glowing Circuits & Science Nodes -->
  <g opacity="0.4">
    <circle cx="150" cy="120" r="80" fill="none" stroke="url(#cyanGrad)" stroke-width="2" stroke-dasharray="6,6"/>
    <circle cx="650" cy="320" r="110" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8,8"/>
    <path d="M 100 225 Q 250 100 400 225 T 700 225" fill="none" stroke="url(#cyanGrad)" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Solar & Water Purification Graphic -->
  <g transform="translate(180, 140)">
    <!-- Solar Rays -->
    <circle cx="100" cy="100" r="55" fill="url(#cyanGrad)" opacity="0.15" filter="url(#glow)"/>
    <!-- Atom / Molecule Rings -->
    <ellipse cx="100" cy="100" rx="90" ry="35" fill="none" stroke="#00E5FF" stroke-width="2.5" transform="rotate(30 100 100)"/>
    <ellipse cx="100" cy="100" rx="90" ry="35" fill="none" stroke="#C49A3C" stroke-width="2.5" transform="rotate(-30 100 100)"/>
    <ellipse cx="100" cy="100" rx="90" ry="35" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <!-- Nucleus -->
    <circle cx="100" cy="100" r="24" fill="url(#goldGrad)"/>
    <path d="M 100 80 L 100 120 M 80 100 L 120 100" stroke="#0A1128" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Gold Trophy Icon -->
  <g transform="translate(520, 110)" filter="url(#glow)">
    <path d="M 30 20 L 90 20 L 80 80 C 80 110 40 110 40 80 Z" fill="url(#goldGrad)"/>
    <path d="M 30 30 C 10 30 10 60 30 60 L 32 60" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 90 30 C 110 30 110 60 90 60 L 88 60" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
    <rect x="52" y="100" width="16" height="30" fill="url(#goldGrad)"/>
    <rect x="35" y="130" width="50" height="20" rx="4" fill="#F3E5AB"/>
    <!-- Star on trophy -->
    <polygon points="60,38 64,50 76,50 66,57 70,70 60,61 50,70 54,57 44,50 56,50" fill="#0A1128"/>
  </g>

  <!-- Typography overlay -->
  <rect x="0" y="320" width="800" height="130" fill="linear-gradient(to top, rgba(10,17,40,0.95), transparent)"/>
  
  <rect x="40" y="340" width="130" height="28" rx="14" fill="url(#goldGrad)"/>
  <text x="105" y="358" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0A1128" text-anchor="middle" letter-spacing="1">1ST PLACE</text>

  <text x="40" y="395" font-family="'Times New Roman', serif" font-size="24" font-weight="bold" fill="#FFFFFF">National Science &amp; Tech Exhibition</text>
  <text x="40" y="420" font-family="sans-serif" font-size="14" fill="#C49A3C">Solar-Powered Water Purification Innovation • Gold Award 2026</text>
</svg>
